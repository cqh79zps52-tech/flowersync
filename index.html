<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="robots" content="noindex" />
	<title>Flower Sync — Return to Obsidian</title>
	<style>
		:root { color-scheme: light dark; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			max-width: 32rem;
			margin: 0 auto;
			padding: 2.5rem 1.25rem;
			line-height: 1.5;
		}
		h1 { font-size: 1.4rem; }
		.btn {
			display: inline-block;
			margin: 1rem 0;
			padding: 0.7rem 1.2rem;
			font-size: 1rem;
			border-radius: 0.5rem;
			background: #7c5cff;
			color: #fff;
			text-decoration: none;
			border: none;
			cursor: pointer;
		}
		.muted { opacity: 0.7; font-size: 0.9rem; }
		code {
			display: block;
			word-break: break-all;
			background: rgba(127,127,127,0.15);
			padding: 0.6rem;
			border-radius: 0.4rem;
			margin-top: 0.5rem;
			font-size: 0.85rem;
		}
		.hidden { display: none; }
		.error { color: #c0392b; }
	</style>
</head>
<body>
	<h1>🌸 Flower Sync</h1>
	<div id="ok">
		<p>You're signed in. Sending you back to Obsidian…</p>
		<a id="returnBtn" class="btn" href="#">Return to Obsidian</a>
		<p class="muted">
			If nothing happens, tap the button above. Still stuck? Copy this code and
			use <em>Flower: Paste auth code</em> in Obsidian:
		</p>
		<code id="codeBox"></code>
	</div>
	<div id="err" class="hidden">
		<p class="error" id="errMsg"></p>
		<p class="muted">Please return to Obsidian and start the login again.</p>
	</div>

	<script>
		(function () {
			// This page is fully static. It only reads the query params Google
			// appended and forwards them to Obsidian via a custom-scheme deep link.
			// It never sees your password or your notes.
			var params = new URLSearchParams(window.location.search);
			var error = params.get("error");
			var code = params.get("code");
			var state = params.get("state");

			if (error || !code || !state) {
				document.getElementById("ok").classList.add("hidden");
				document.getElementById("err").classList.remove("hidden");
				document.getElementById("errMsg").textContent =
					"Authorization " + (error ? "error: " + error : "response was incomplete") + ".";
				return;
			}

			var deepLink =
				"obsidian://flower-auth?code=" +
				encodeURIComponent(code) +
				"&state=" +
				encodeURIComponent(state);

			document.getElementById("codeBox").textContent = code + "::" + state;
			var btn = document.getElementById("returnBtn");
			btn.setAttribute("href", deepLink);

			// Try an automatic redirect (works on desktop and often on mobile).
			// iOS frequently requires a user gesture, hence the visible button.
			setTimeout(function () {
				window.location.href = deepLink;
			}, 250);
		})();
	</script>
</body>
</html>
